<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Model Scroll</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    overflow-x: hidden;
  }
  #scroll-spacer {
    height: 400vh;
  }
  #canvas-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
  }
  #loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #eee;
    font-family: sans-serif;
    font-size: 1.2rem;
    z-index: 10;
  }
  #hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: #ccc;
    font-family: sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.6;
    z-index: 10;
    transition: opacity 0.3s ease;
  }
  #progress-dots {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  #progress-dots .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    opacity: 0.25;
    transition: opacity 0.3s ease;
  }
  #progress-dots .dot.active {
    opacity: 0.9;
  }
  .info-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-family: sans-serif;
    color: #f2f2f2;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
    z-index: 5;
  }
  .info-panel.visible {
    opacity: 1;
  }
  .info-panel .label {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #c98b4a;
    margin-bottom: 10px;
  }
  .info-panel .value {
    font-size: 2.2rem;
    font-weight: 600;
    font-style: italic;
  }
</style>
</head>
<body>
  <div id="canvas-container">
    <div id="loading">Loading model...</div>
  </div>
  <div id="info-0" class="info-panel">
    <div class="label">Variedad</div>
    <div class="value">Bourbon Caturra</div>
  </div>
  <div id="info-1" class="info-panel">
    <div class="label">Altitud</div>
    <div class="value">1800 MSNM</div>
  </div>
  <div id="info-2" class="info-panel">
    <div class="label">Finca</div>
    <div class="value">Vista Hermosa</div>
  </div>
  <div id="info-3" class="info-panel">
    <div class="label">Proceso</div>
    <div class="value">Lavado</div>
  </div>
  <div id="info-4" class="info-panel">
    <div class="label">Región</div>
    <div class="value">Huehuetenango</div>
  </div>
  <div id="progress-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div id="hint">Scroll to rotate</div>
  <div id="scroll-spacer"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

const container = document.getElementById('canvas-container');
const loadingEl = document.getElementById('loading');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 1.0);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight2.position.set(-5, -5, -5);
scene.add(dirLight2);

let model = null;

const mtlLoader = new MTLLoader();
mtlLoader.load('3DModel.mtl', (materials) => {
  materials.preload();
  const objLoader = new OBJLoader();
  objLoader.setMaterials(materials);
  objLoader.load(
    '3DModel.obj',
    (object) => {
      model = object;

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.6 / maxDim;

      model.position.sub(center);
      model.scale.setScalar(scale);

      scene.add(model);
      loadingEl.style.display = 'none';
    },
    (xhr) => {
      if (xhr.lengthComputable) {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        loadingEl.textContent = `Loading model... ${pct}%`;
      }
    },
    (error) => {
      loadingEl.textContent = 'Failed to load model.';
      console.error(error);
    }
  );
});

const infoPanels = [0, 1, 2, 3, 4].map((i) => document.getElementById(`info-${i}`));
const dots = document.querySelectorAll('#progress-dots .dot');
const hintEl = document.getElementById('hint');

function getScrollProgress() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  return docHeight > 0 ? scrollTop / docHeight : 0;
}

function updateInfoPanels(progress) {
  const segment = 1 / infoPanels.length;
  const activeIndex = Math.min(infoPanels.length - 1, Math.floor(progress / segment));
  infoPanels.forEach((panel, i) => {
    panel.classList.toggle('visible', i === activeIndex && progress > 0.01);
  });
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === activeIndex);
  });
  hintEl.style.opacity = progress > 0.01 ? '0' : '0.6';
}

function animate() {
  requestAnimationFrame(animate);
  if (model) {
    const progress = getScrollProgress();
    model.rotation.y = -progress * Math.PI * 2;
    updateInfoPanels(progress);
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
