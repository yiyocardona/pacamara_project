<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Model Scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0c0a08;
    overflow-x: hidden;
  }
  #scroll-spacer {
    height: 400vh;
  }
  #canvas-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(ellipse 60% 45% at 50% 46%, rgba(201, 139, 74, 0.16), transparent 70%),
      radial-gradient(ellipse 120% 90% at 50% 100%, rgba(60, 40, 20, 0.35), transparent 60%),
      #0c0a08;
  }
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    box-shadow: inset 0 0 18vw rgba(0, 0, 0, 0.65);
  }
  #loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #d8cfc2;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 10;
  }
  #progress-rail {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 2px;
    background: rgba(255, 255, 255, 0.08);
    z-index: 10;
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #c98b4a, #e8b978);
    transition: width 0.05s linear;
  }
  #hint {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: #a99a86;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.7;
    z-index: 10;
    transition: opacity 0.4s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #hint::before, #hint::after {
    content: "";
    display: block;
    width: 22px;
    height: 1px;
    background: rgba(169, 154, 134, 0.5);
  }
  #counter {
    position: fixed;
    bottom: 28px;
    right: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: #a99a86;
    opacity: 0.8;
    z-index: 10;
  }
  #counter .current {
    color: #e8b978;
  }
  .info-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) translateY(6px);
    text-align: center;
    opacity: 0;
    transition: opacity 0.7s ease, transform 0.7s ease;
    pointer-events: none;
    z-index: 5;
    width: 100%;
    padding: 0 20px;
    box-sizing: border-box;
  }
  .info-panel.visible {
    opacity: 1;
    transform: translate(-50%, -50%) translateY(0);
  }
  .info-panel .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #c98b4a;
    margin-bottom: 14px;
  }
  .info-panel .value {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.9rem, 5vw, 3rem);
    color: #f4ece1;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>
  <div id="progress-rail"><div id="progress-fill"></div></div>
  <div id="canvas-container">
    <div id="loading">Loading model...</div>
  </div>
  <div id="vignette"></div>
  <div id="info-0" class="info-panel">
    <div class="label">Variedad</div>
    <div class="value">Bourbon Caturra</div>
  </div>
  <div id="info-1" class="info-panel">
    <div class="label">Altitud</div>
    <div class="value">1800 MSNM</div>
  </div>
  <div id="info-2" class="info-panel">
    <div class="label">Finca</div>
    <div class="value">Vista Hermosa</div>
  </div>
  <div id="info-3" class="info-panel">
    <div class="label">Proceso</div>
    <div class="value">Lavado</div>
  </div>
  <div id="info-4" class="info-panel">
    <div class="label">Región</div>
    <div class="value">Huehuetenango</div>
  </div>
  <div id="counter"><span class="current">01</span> / 05</div>
  <div id="hint">Scroll</div>
  <div id="scroll-spacer"></div>

<script>
  if (!HTMLScriptElement.supports || !HTMLScriptElement.supports('importmap')) {
    document.getElementById('loading').textContent =
      'Your browser does not support import maps. Please open this page in a recent version of Chrome, Edge, or Safari 16.4+.';
  }
  window.__modelLoadTimeout = setTimeout(() => {
    const el = document.getElementById('loading');
    if (el && el.style.display !== 'none') {
      el.textContent = 'Still loading... this is taking longer than expected. Check your connection or try a different browser (Chrome/Edge recommended).';
    }
  }, 12000);
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

const container = document.getElementById('canvas-container');
const loadingEl = document.getElementById('loading');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0a08);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 1.0);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight2.position.set(-5, -5, -5);
scene.add(dirLight2);

let model = null;

const mtlLoader = new MTLLoader();
mtlLoader.load('3DModel.mtl', (materials) => {
  materials.preload();
  const objLoader = new OBJLoader();
  objLoader.setMaterials(materials);
  objLoader.load(
    '3DModel.obj',
    (object) => {
      model = object;

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.6 / maxDim;

      model.position.sub(center);
      model.scale.setScalar(scale);

      scene.add(model);
      loadingEl.style.display = 'none';
      clearTimeout(window.__modelLoadTimeout);
    },
    (xhr) => {
      if (xhr.lengthComputable) {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        loadingEl.textContent = `Loading model... ${pct}%`;
      }
    },
    (error) => {
      loadingEl.textContent = 'Failed to load model.';
      console.error(error);
      clearTimeout(window.__modelLoadTimeout);
    }
  );
}, undefined, (error) => {
  loadingEl.textContent = 'Failed to load material file.';
  console.error(error);
  clearTimeout(window.__modelLoadTimeout);
});

const infoPanels = [0, 1, 2, 3, 4].map((i) => document.getElementById(`info-${i}`));
const hintEl = document.getElementById('hint');
const progressFillEl = document.getElementById('progress-fill');
const counterCurrentEl = document.querySelector('#counter .current');

function getScrollProgress() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  return docHeight > 0 ? scrollTop / docHeight : 0;
}

function updateInfoPanels(progress) {
  const segment = 1 / infoPanels.length;
  const activeIndex = Math.min(infoPanels.length - 1, Math.floor(progress / segment));
  infoPanels.forEach((panel, i) => {
    panel.classList.toggle('visible', i === activeIndex && progress > 0.01);
  });
  progressFillEl.style.width = `${progress * 100}%`;
  counterCurrentEl.textContent = String(activeIndex + 1).padStart(2, '0');
  hintEl.style.opacity = progress > 0.01 ? '0' : '0.7';
}

function animate() {
  requestAnimationFrame(animate);
  if (model) {
    const progress = getScrollProgress();
    model.rotation.y = Math.PI - progress * Math.PI * 2;
    updateInfoPanels(progress);
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
