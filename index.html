<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Model Scroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0c0a08;
    overflow-x: hidden;
  }
  #scroll-spacer {
    height: 400vh;
  }
  #canvas-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: #171310;
  }
  #loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #cfc4b4;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1rem;
    z-index: 10;
  }
  #header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    box-sizing: border-box;
    padding: 36px 40px 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8f8272;
    z-index: 10;
  }
  #header .mark {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.1rem;
    letter-spacing: 0.01em;
    color: #e9dfd0;
    text-transform: none;
  }
  #spec-sheet {
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    box-sizing: border-box;
    padding: 32px 40px 40px;
    z-index: 6;
    pointer-events: none;
  }
  #spec-sheet .rule {
    width: 100%;
    height: 1px;
    background: rgba(255, 255, 255, 0.12);
    margin-bottom: 22px;
  }
  #spec-sheet .row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
  }
  #spec-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #8f8272;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.45s ease;
  }
  #spec-value {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.3rem, 3.4vw, 1.9rem);
    color: #f4ece1;
    text-align: right;
    opacity: 0;
    transition: opacity 0.45s ease;
  }
  #spec-label.visible, #spec-value.visible {
    opacity: 1;
  }
  #hint {
    position: fixed;
    bottom: 118px;
    left: 50%;
    transform: translateX(-50%);
    color: #8f8272;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.7;
    z-index: 10;
    transition: opacity 0.4s ease;
  }
</style>
</head>
<body>
  <div id="header">
    <span class="mark">Dosocho</span>
    <span>Single Origin</span>
  </div>
  <div id="canvas-container">
    <div id="loading">Loading model...</div>
  </div>
  <div id="spec-sheet">
    <div class="rule"></div>
    <div class="row">
      <div id="spec-label">Variedad</div>
      <div id="spec-value">Bourbon Caturra</div>
    </div>
  </div>
  <div id="hint">Scroll</div>
  <div id="scroll-spacer"></div>

<script>
  if (!HTMLScriptElement.supports || !HTMLScriptElement.supports('importmap')) {
    document.getElementById('loading').textContent =
      'Your browser does not support import maps. Please open this page in a recent version of Chrome, Edge, or Safari 16.4+.';
  }
  window.__modelLoadTimeout = setTimeout(() => {
    const el = document.getElementById('loading');
    if (el && el.style.display !== 'none') {
      el.textContent = 'Still loading... this is taking longer than expected. Check your connection or try a different browser (Chrome/Edge recommended).';
    }
  }, 12000);
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

const container = document.getElementById('canvas-container');
const loadingEl = document.getElementById('loading');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x171310);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff, 1.0);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight2.position.set(-5, -5, -5);
scene.add(dirLight2);

let model = null;

const mtlLoader = new MTLLoader();
mtlLoader.load('3DModel.mtl', (materials) => {
  materials.preload();
  const objLoader = new OBJLoader();
  objLoader.setMaterials(materials);
  objLoader.load(
    '3DModel.obj',
    (object) => {
      model = object;

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.6 / maxDim;

      model.position.sub(center);
      model.scale.setScalar(scale);

      scene.add(model);
      loadingEl.style.display = 'none';
      clearTimeout(window.__modelLoadTimeout);
    },
    (xhr) => {
      if (xhr.lengthComputable) {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        loadingEl.textContent = `Loading model... ${pct}%`;
      }
    },
    (error) => {
      loadingEl.textContent = 'Failed to load model.';
      console.error(error);
      clearTimeout(window.__modelLoadTimeout);
    }
  );
}, undefined, (error) => {
  loadingEl.textContent = 'Failed to load material file.';
  console.error(error);
  clearTimeout(window.__modelLoadTimeout);
});

const specs = [
  { label: 'Variedad', value: 'Bourbon Caturra' },
  { label: 'Altitud', value: '1800 MSNM' },
  { label: 'Finca', value: 'Vista Hermosa' },
  { label: 'Proceso', value: 'Lavado' },
  { label: 'Región', value: 'Huehuetenango' },
];
const hintEl = document.getElementById('hint');
const specLabelEl = document.getElementById('spec-label');
const specValueEl = document.getElementById('spec-value');
let currentSpecIndex = -1;

function getScrollProgress() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  return docHeight > 0 ? scrollTop / docHeight : 0;
}

function updateSpecSheet(progress) {
  const segment = 1 / specs.length;
  const activeIndex = Math.min(specs.length - 1, Math.floor(progress / segment));
  const isVisible = progress > 0.01;

  if (activeIndex !== currentSpecIndex) {
    currentSpecIndex = activeIndex;
    specLabelEl.textContent = specs[activeIndex].label;
    specValueEl.textContent = specs[activeIndex].value;
  }

  specLabelEl.classList.toggle('visible', isVisible);
  specValueEl.classList.toggle('visible', isVisible);
  hintEl.style.opacity = isVisible ? '0' : '0.7';
}

function animate() {
  requestAnimationFrame(animate);
  if (model) {
    const progress = getScrollProgress();
    model.rotation.y = Math.PI - progress * Math.PI * 2;
    updateSpecSheet(progress);
  }
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
